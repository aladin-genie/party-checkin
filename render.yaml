services:
  - type: web
    name: party-checkin
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        sync: false  # Set a persistent secret in Render dashboard

      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USE_TLS
        value: "true"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
        value: ""
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/party_guests.db
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
