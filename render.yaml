services:
  - type: web
    name: event-checkin
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    # Free tier: no persistent disk — database is hosted on Supabase (PostgreSQL)
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        sync: false  # Set a long random string in Render dashboard
      - key: DATABASE_URL
        sync: false  # Paste your Supabase connection string (Settings > Database > URI)
      - key: ADMIN_PASSWORD
        sync: false  # Super admin password for /admin/
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USE_TLS
        value: "true"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
