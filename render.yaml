services:
  - type: web
    name: party-checkin
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    # Free tier: no persistent disk — database is hosted on Supabase (PostgreSQL)
    # Upgrade to a paid Render plan whenever you need the app always-on (no cold starts)
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        sync: false  # Set a persistent secret in Render dashboard
      - key: DATABASE_URL
        sync: false  # Paste your Supabase connection string here (Settings > Database > URI)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: TICKET_PRICE_CENTS
        value: 2000
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USE_TLS
        value: "true"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
        value: ""
