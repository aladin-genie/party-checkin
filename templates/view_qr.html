<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your QR Code - Party 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }
        
        .party-title {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .guest-name {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .ticket-info {
            color: #666;
            margin-bottom: 25px;
            font-size: 1.1em;
        }
        
        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            border: 3px dashed #667eea;
            margin-bottom: 25px;
        }
        
        .qr-container img {
            max-width: 100%;
            height: auto;
        }
        
        .instructions {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.95em;
            color: #555;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #5568d3;
        }
        
        .download-btn {
            background: #28a745;
            margin-left: 10px;
        }
        
        .download-btn:hover {
            background: #218838;
        }
        
        @media print {
            body {
                background: white;
            }
            .card {
                box-shadow: none;
            }
            .no-print {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="party-title">🎉 Party 2026</div>
        <div class="guest-name">{{ guest.name }}</div>
        <div class="ticket-info">{{ guest.ticket_count }} Ticket{{ 's' if guest.ticket_count > 1 else '' }}</div>
        
        <div class="qr-container">
            <img src="data:image/png;base64,{{ qr_image }}" alt="QR Code">
        </div>
        
        <div class="instructions">
            📱 Show this QR code at the entrance for check-in
        </div>
        
        <div class="no-print">
            <a href="/" class="btn">← Back</a>
            <button class="btn download-btn" onclick="window.print()">🖨️ Print</button>
        </div>
    </div>
</body>
</html>
