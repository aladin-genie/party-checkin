<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self Check-In - Party 2026</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            color: white;
            padding: 20px 0;
        }
        
        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .scanner-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        #reader {
            width: 100% !important;
            border: none !important;
            border-radius: 15px;
            overflow: hidden;
        }
        
        #reader video {
            border-radius: 15px;
        }
        
        .status-area {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .status-waiting {
            background: #f0f0f0;
        }
        
        .status-success {
            background: #d4edda;
            border: 3px solid #28a745;
            animation: pulse 1s ease-in-out;
        }
        
        .status-error {
            background: #f8d7da;
            border: 3px solid #dc3545;
        }
        
        .status-warning {
            background: #fff3cd;
            border: 3px solid #ffc107;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .guest-name {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .ticket-count {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .icon {
            font-size: 4em;
            margin-bottom: 15px;
        }
        
        .manual-entry {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #ddd;
        }
        
        .manual-entry input {
            padding: 12px;
            font-size: 1em;
            border: 2px solid #ddd;
            border-radius: 8px;
            width: 250px;
            margin-right: 10px;
        }
        
        .manual-entry button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            transition: background 0.3s;
        }
        
        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            color: white;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        @media (max-width: 600px) {
            header h1 {
                font-size: 1.5em;
            }
            
            .guest-name {
                font-size: 1.5em;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📷 Self Check-In</h1>
            <p>Scan your QR code at the entrance</p>
        </header>
        
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="checked-in-count">0</div>
                <div>Checked In</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="total-count">0</div>
                <div>Total</div>
            </div>
        </div>
        
        <div class="scanner-container">
            <div id="reader"></div>
            
            <div id="status-area" class="status-area status-waiting">
                <div class="icon">📱</div>
                <p>Point your camera at the QR code</p>
            </div>
            
            <div class="manual-entry">
                <p>Or enter your ticket ID manually:</p>
                <input type="text" id="manual-code" placeholder="Enter ticket ID" >
                <button onclick="checkInManual()">Check In</button>
            </div>
        </div>
        
        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script>
        let html5QrCode;
        let isProcessing = false;
        let lastScanned = null;
        
        // Initialize scanner
        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            
            const config = {
                fps: 10,
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0
            };
            
            html5QrCode.start(
                { facingMode: "environment" },
                config,
                onScanSuccess,
                onScanFailure
            ).catch(err => {
                console.error("Scanner failed:", err);
                document.getElementById('status-area').innerHTML = `
                    <div class="icon">⚠️</div>
                    <p>Camera access denied. Please allow camera access and refresh.</p>
                `;
                document.getElementById('status-area').className = 'status-area status-error';
            });
        }
        
        function onScanSuccess(decodedText, decodedResult) {
            if (isProcessing) return;
            if (lastScanned === decodedText) return; // Prevent double scan
            
            lastScanned = decodedText;
            isProcessing = true;
            
            // Pause scanning
            html5QrCode.pause();
            
            // Process check-in
            processCheckIn(decodedText);
        }
        
        function onScanFailure(error) {
            // Silent fail - keep scanning
        }
        
        async function processCheckIn(qrCode) {
            try {
                const response = await fetch('/api/checkin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ qr_code: qrCode })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayResult(data);
                    updateStats();
                } else {
                    showError(data.error || 'Check-in failed');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }
        
        function displayResult(data) {
            const statusArea = document.getElementById('status-area');
            const guest = data.guest;
            
            if (data.already_checked_in) {
                // Already checked in
                statusArea.className = 'status-area status-warning';
                statusArea.innerHTML = `
                    <div class="icon">⚠️</div>
                    <div class="guest-name">${guest.name}</div>
                    <div class="ticket-count">Already checked in at ${new Date(guest.checkin_time).toLocaleTimeString()}</div>
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="resumeScanning()">Scan Next</button>
                    </div>
                `;
                speak(`${guest.name} already checked in`);
            } else {
                // Successful check-in
                statusArea.className = 'status-area status-success';
                statusArea.innerHTML = `
                    <div class="icon">🎉</div>
                    <div class="guest-name">${guest.name}</div>
                    <div class="ticket-count">${guest.ticket_count} ticket${guest.ticket_count > 1 ? 's' : ''}</div>
                    <div class="action-buttons">
                        <button class="btn btn-success" onclick="markBandGiven(${guest.id})">✓ Band Given</button>
                        <button class="btn btn-primary" onclick="resumeScanning()">Scan Next</button>
                    </div>
                `;
                
                // Announce
                const announcement = data.announcement || `Welcome ${guest.name}! You have ${guest.ticket_count} tickets.`;
                speak(announcement);
            }
        }
        
        function showError(message) {
            const statusArea = document.getElementById('status-area');
            statusArea.className = 'status-area status-error';
            statusArea.innerHTML = `
                <div class="icon">❌</div>
                <p>${message}</p>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="resumeScanning()">Try Again</button>
                </div>
            `;
            speak("Check in failed. Please try again.");
        }
        
        async function markBandGiven(guestId) {
            try {
                const response = await fetch('/api/give-band', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ guest_id: guestId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    speak("Band marked as given");
                    resumeScanning();
                }
            } catch (error) {
                console.error('Failed to mark band:', error);
            }
        }
        
        function resumeScanning() {
            isProcessing = false;
            lastScanned = null;
            
            const statusArea = document.getElementById('status-area');
            statusArea.className = 'status-area status-waiting';
            statusArea.innerHTML = `
                <div class="icon">📱</div>
                <p>Point your camera at the QR code</p>
            `;
            
            html5QrCode.resume();
        }
        
        function checkInManual() {
            const code = document.getElementById('manual-code').value.trim();
            if (code) {
                processCheckIn(code);
                document.getElementById('manual-code').value = '';
            }
        }
        
        function speak(text) {
            // Use browser's speech synthesis
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9;
                utterance.pitch = 1.0;
                window.speechSynthesis.speak(utterance);
            }
        }
        
        async function updateStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                
                document.getElementById('checked-in-count').textContent = stats.checked_in;
                document.getElementById('total-count').textContent = stats.total_guests;
            } catch (error) {
                console.error('Failed to update stats:', error);
            }
        }
        
        // Load initial stats
        updateStats();
        
        // Start scanner on load
        window.addEventListener('load', startScanner);
    </script>
</body>
</html>
