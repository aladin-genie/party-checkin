<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-In - Dallas Boyz Party</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #c62828 50%, #1a237e 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            color: white;
            padding: 20px 0;
        }
        
        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .scanner-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        #reader {
            width: 100% !important;
            border: none !important;
            border-radius: 15px;
            overflow: hidden;
        }
        
        #reader video {
            border-radius: 15px;
        }
        
        .status-area {
            margin-top: 30px;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .status-waiting {
            background: #f0f0f0;
        }
        
        .status-success {
            background: #e8f5e9;
            border: 3px solid #4caf50;
            animation: pulse 0.5s ease-in-out;
        }
        
        .status-error {
            background: #ffebee;
            border: 3px solid #f44336;
        }
        
        .status-warning {
            background: #fff3e0;
            border: 3px solid #ff9800;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .welcome-message {
            font-size: 1.2em;
            color: #2e7d32;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .guest-name {
            font-size: 2.5em;
            font-weight: bold;
            color: #1a237e;
            margin-bottom: 10px;
        }
        
        .ticket-info {
            font-size: 1.3em;
            color: #555;
            margin-bottom: 20px;
        }
        
        .ticket-info .count {
            font-size: 1.8em;
            font-weight: bold;
            color: #c62828;
        }
        
        .band-section {
            background: white;
            border: 2px solid #ddd;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            width: 100%;
            max-width: 500px;
        }
        
        .band-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        
        .band-counter {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .band-counter button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .band-counter .minus {
            background: #f44336;
            color: white;
        }
        
        .band-counter .plus {
            background: #4caf50;
            color: white;
        }
        
        .band-counter button:hover {
            transform: scale(1.1);
        }
        
        .band-counter button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .band-count-display {
            font-size: 3em;
            font-weight: bold;
            color: #1a237e;
            min-width: 100px;
        }
        
        .band-remaining {
            color: #666;
            font-size: 0.95em;
            margin-top: 10px;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }
        
        .btn-primary {
            background: #1a237e;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0d1642;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #4caf50;
            color: white;
        }
        
        .btn-success:hover {
            background: #388e3c;
        }
        
        .icon {
            font-size: 4em;
            margin-bottom: 15px;
        }
        
        .manual-entry {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #ddd;
        }
        
        .manual-entry input {
            padding: 12px;
            font-size: 1em;
            border: 2px solid #ddd;
            border-radius: 8px;
            width: 250px;
            margin-right: 10px;
        }
        
        .manual-entry button {
            padding: 12px 24px;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            transition: background 0.3s;
        }
        
        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            color: white;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .attendee-list {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: left;
            max-width: 500px;
        }
        
        .attendee-list h4 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .attendee-list ul {
            list-style: none;
            padding: 0;
        }
        
        .attendee-list li {
            padding: 5px 0;
            color: #555;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .attendee-list li:last-child {
            border-bottom: none;
        }
        
        @media (max-width: 600px) {
            header h1 {
                font-size: 1.5em;
            }
            
            .guest-name {
                font-size: 1.8em;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
            
            .band-counter {
                gap: 10px;
            }
            
            .band-count-display {
                font-size: 2.5em;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏏 Dallas Boyz Party Check-In</h1>
            <p>Welcome! Scan your QR code to check in</p>
        </header>
        
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="checked-in-count">0</div>
                <div>Checked In</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="total-count">0</div>
                <div>Total Guests</div>
            </div>
        </div>
        
        <div class="scanner-container">
            <div id="reader"></div>
            
            <div id="status-area" class="status-area status-waiting">
                <div class="icon">📱</div>
                <p>Point your camera at the QR code</p>
            </div>
            
            <div class="manual-entry">
                <p>Or enter your ticket ID manually:</p>
                <input type="text" id="manual-code" placeholder="Enter ticket ID" >
                <button onclick="checkInManual()">Check In</button>
            </div>
        </div>
        
        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script>
        let html5QrCode;
        let isProcessing = false;
        let lastScanned = null;
        let currentGuestId = null;
        let currentBandsGiven = 0;
        let currentTotalTickets = 0;
        
        // Initialize scanner
        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            
            const config = {
                fps: 10,
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0
            };
            
            html5QrCode.start(
                { facingMode: "environment" },
                config,
                onScanSuccess,
                onScanFailure
            ).catch(err => {
                console.error("Scanner failed:", err);
                document.getElementById('status-area').innerHTML = `
                    <div class="icon">⚠️</div>
                    <p>Camera access denied. Please allow camera access and refresh.</p>
                `;
                document.getElementById('status-area').className = 'status-area status-error';
            });
        }
        
        function onScanSuccess(decodedText, decodedResult) {
            if (isProcessing) return;
            if (lastScanned === decodedText) return;
            
            lastScanned = decodedText;
            isProcessing = true;
            
            html5QrCode.pause();
            processCheckIn(decodedText);
        }
        
        function onScanFailure(error) {
            // Silent fail
        }
        
        async function processCheckIn(qrCode) {
            try {
                const response = await fetch('/api/checkin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ qr_code: qrCode })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayResult(data);
                    updateStats();
                } else {
                    showError(data.error || 'Check-in failed');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }
        
        function displayResult(data) {
            const statusArea = document.getElementById('status-area');
            const guest = data.guest;
            
            currentGuestId = guest.id;
            currentTotalTickets = guest.ticket_count || guest.num_attendees || 1;
            currentBandsGiven = guest.bands_given || 0;
            
            // Parse attendee names if available
            let attendeeListHTML = '';
            if (guest.attendee_names) {
                const names = guest.attendee_names.split(',').map(n => n.trim()).filter(n => n);
                if (names.length > 0) {
                    attendeeListHTML = `
                        <div class="attendee-list">
                            <h4>👥 Attendees (${names.length + 1} total):</h4>
                            <ul>
                                <li>👤 ${guest.name} (Primary)</li>
                                ${names.map(n => `<li>👤 ${n}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }
            }
            
            if (data.already_checked_in) {
                // Already checked in - show update bands option
                statusArea.className = 'status-area status-warning';
                statusArea.innerHTML = `
                    <div class="icon">👋</div>
                    <div class="welcome-message">Welcome back! 👋</div>
                    <div class="guest-name">${guest.name}</div>
                    <div class="ticket-info">
                        Total tickets: <span class="count">${currentTotalTickets}</span>
                    </div>
                    
                    ${attendeeListHTML}
                    
                    <div class="band-section">
                        <h3>🎫 Update Bands Given</h3>
                        <p style="color: #666; margin-bottom: 15px;">
                            How many bands are you collecting now?
                        </p>
                        <div class="band-counter">
                            <button class="minus" onclick="adjustBands(-1)">−</button>
                            <div class="band-count-display" id="bandCount">1</div>
                            <button class="plus" onclick="adjustBands(1)">+</button>
                        </div>
                        <div class="band-remaining">
                            Total: <strong>${currentTotalTickets}</strong> | 
                            Already given: <strong>${currentBandsGiven}</strong> | 
                            Remaining: <strong>${currentTotalTickets - currentBandsGiven}</strong>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn btn-success" onclick="saveBands()">✓ Give Bands</button>
                        <button class="btn btn-primary" onclick="resumeScanning()">Scan Next</button>
                    </div>
                `;
            } else {
                // First check-in
                statusArea.className = 'status-area status-success';
                statusArea.innerHTML = `
                    <div class="icon">🎉</div>
                    <div class="welcome-message">Welcome to Dallas Boyz Party! 🎉</div>
                    <div class="guest-name">${guest.name}</div>
                    <div class="ticket-info">
                        Total tickets: <span class="count">${currentTotalTickets}</span>
                    </div>
                    
                    ${attendeeListHTML}
                    
                    <div class="band-section">
                        <h3>🎫 Bands to Give Now</h3>
                        <p style="color: #666; margin-bottom: 15px;">
                            How many bands are you collecting right now?
                            (You can collect more later)
                        </p>
                        <div class="band-counter">
                            <button class="minus" onclick="adjustBands(-1)" id="minusBtn">−</button>
                            <div class="band-count-display" id="bandCount">${Math.min(1, currentTotalTickets)}</div>
                            <button class="plus" onclick="adjustBands(1)" id="plusBtn">+</button>
                        </div>
                        <div class="band-remaining">
                            Total bands: <strong>${currentTotalTickets}</strong> | 
                            Taking now: <strong id="takingNow">${Math.min(1, currentTotalTickets)}</strong> | 
                            Can collect later: <strong id="canCollectLater">${currentTotalTickets - Math.min(1, currentTotalTickets)}</strong>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn btn-success" onclick="saveBands()">✓ Check In & Give Bands</button>
                        <button class="btn btn-primary" onclick="resumeScanning()">Cancel</button>
                    </div>
                `;
            }
            
            updateButtonStates();
        }
        
        let bandsToGive = 1;
        
        function adjustBands(delta) {
            const maxCanGive = currentTotalTickets - currentBandsGiven;
            bandsToGive = Math.max(0, Math.min(bandsToGive + delta, maxCanGive));
            
            document.getElementById('bandCount').textContent = bandsToGive;
            
            const takingNowEl = document.getElementById('takingNow');
            const canCollectLaterEl = document.getElementById('canCollectLater');
            if (takingNowEl) takingNowEl.textContent = bandsToGive;
            if (canCollectLaterEl) canCollectLaterEl.textContent = currentTotalTickets - currentBandsGiven - bandsToGive;
            
            updateButtonStates();
        }
        
        function updateButtonStates() {
            const maxCanGive = currentTotalTickets - currentBandsGiven;
            const minusBtn = document.getElementById('minusBtn');
            const plusBtn = document.getElementById('plusBtn');
            
            if (minusBtn) minusBtn.disabled = bandsToGive <= 0;
            if (plusBtn) plusBtn.disabled = bandsToGive >= maxCanGive;
        }
        
        async function saveBands() {
            if (bandsToGive <= 0) {
                alert('Please select at least 1 band to give');
                return;
            }
            
            try {
                const response = await fetch('/api/give-bands', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        guest_id: currentGuestId,
                        bands_count: bandsToGive
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Show confirmation
                    const statusArea = document.getElementById('status-area');
                    statusArea.innerHTML = `
                        <div class="icon">✅</div>
                        <div class="welcome-message">${data.message}</div>
                        <div class="ticket-info" style="margin-top: 20px;">
                            Bands given: <span class="count">${data.bands_given}</span> / ${data.total_bands}
                        </div>
                        <div class="action-buttons" style="margin-top: 30px;">
                            <button class="btn btn-primary" onclick="resumeScanning()">Scan Next Guest →</button>
                        </div>
                    `;
                } else {
                    alert(data.error || 'Failed to save');
                }
            } catch (error) {
                alert('Network error. Please try again.');
            }
        }
        
        function showError(message) {
            const statusArea = document.getElementById('status-area');
            statusArea.className = 'status-area status-error';
            statusArea.innerHTML = `
                <div class="icon">❌</div>
                <p>${message}</p>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="resumeScanning()">Try Again</button>
                </div>
            `;
        }
        
        function resumeScanning() {
            isProcessing = false;
            lastScanned = null;
            currentGuestId = null;
            currentBandsGiven = 0;
            currentTotalTickets = 0;
            bandsToGive = 1;
            
            const statusArea = document.getElementById('status-area');
            statusArea.className = 'status-area status-waiting';
            statusArea.innerHTML = `
                <div class="icon">📱</div>
                <p>Point your camera at the QR code</p>
            `;
            
            html5QrCode.resume();
        }
        
        function checkInManual() {
            const code = document.getElementById('manual-code').value.trim();
            if (code) {
                processCheckIn(code);
                document.getElementById('manual-code').value = '';
            }
        }
        
        async function updateStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                
                document.getElementById('checked-in-count').textContent = stats.checked_in;
                document.getElementById('total-count').textContent = stats.total_guests;
            } catch (error) {
                console.error('Failed to update stats:', error);
            }
        }
        
        // Load initial stats
        updateStats();
        
        // Start scanner on load
        window.addEventListener('load', startScanner);
    </script>
</body>
</html>
