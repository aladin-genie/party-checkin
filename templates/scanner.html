<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-In – Dallas Boyz Party</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy:   #1a237e;
            --red:    #c62828;
            --green:  #2e7d32;
            --light:  #f4f5f9;
            --white:  #ffffff;
            --text:   #1c1c2e;
            --muted:  #6b7280;
            --border: #e5e7eb;
            --radius: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(145deg, var(--navy) 0%, #311b92 50%, var(--red) 100%);
            min-height: 100vh;
            color: var(--text);
        }

        /* ── Topbar ─────────────────────────────── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 60px;
            background: rgba(0,0,0,.25);
            backdrop-filter: blur(10px);
            color: white;
        }
        .topbar-brand { font-weight: 700; font-size: .95rem; }
        .topbar-stats { display: flex; gap: 20px; }
        .topbar-stat { text-align: center; }
        .topbar-stat-val { font-size: 1.25rem; font-weight: 800; line-height: 1; }
        .topbar-stat-label { font-size: .65rem; font-weight: 600; opacity: .7; text-transform: uppercase; letter-spacing: .06em; }
        .back-btn {
            color: rgba(255,255,255,.75);
            text-decoration: none;
            font-size: .8rem;
            font-weight: 500;
            transition: color .2s;
        }
        .back-btn:hover { color: white; }

        /* ── Main layout ────────────────────────── */
        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        /* ── Cards ──────────────────────────────── */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,.2);
        }
        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-size: .8rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .07em;
        }
        .card-body { padding: 20px; }

        /* ── Scanner ────────────────────────────── */
        #reader { width: 100% !important; }
        #reader video { border-radius: 10px; width: 100% !important; }
        #reader img { display: none !important; }
        /* Hide the html5-qrcode UI chrome we don't need */
        #reader__dashboard_section_csr button { display: none !important; }

        /* ── Result panel ───────────────────────── */
        .result-area {
            min-height: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 28px 20px;
        }
        .result-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .result-title { font-size: .75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
        .result-name { font-size: 2rem; font-weight: 800; color: var(--navy); line-height: 1.1; margin-bottom: 4px; }
        .result-sub { font-size: .95rem; color: var(--muted); margin-bottom: 20px; }

        /* State colors */
        .result-area.state-success { background: #f0fdf4; }
        .result-area.state-warning { background: #fffbeb; }
        .result-area.state-error   { background: #fef2f2; }
        .result-area.state-idle    { background: var(--light); }

        /* ── Band counter ───────────────────────── */
        .band-box {
            background: white;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
            width: 100%;
            max-width: 340px;
            margin: 0 auto 20px;
        }
        .band-box h4 { font-size: .8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 14px; }
        .band-counter { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 10px; }
        .band-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: none;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s, opacity .2s;
            font-family: inherit;
            display: flex; align-items: center; justify-content: center;
        }
        .band-btn:disabled { opacity: .3; cursor: not-allowed; transform: none !important; }
        .band-btn:hover:not(:disabled) { transform: scale(1.1); }
        .band-btn.minus { background: #fee2e2; color: var(--red); }
        .band-btn.plus  { background: #dcfce7; color: var(--green); }
        .band-num { font-size: 2.8rem; font-weight: 800; color: var(--navy); min-width: 64px; }
        .band-meta { font-size: .78rem; color: var(--muted); text-align: center; }

        /* ── Attendee list ──────────────────────── */
        .attendee-list {
            background: var(--light);
            border-radius: 10px;
            padding: 12px 16px;
            text-align: left;
            width: 100%;
            max-width: 340px;
            margin: 0 auto 16px;
        }
        .attendee-list h5 { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
        .attendee-list ul { list-style: none; }
        .attendee-list li { font-size: .82rem; padding: 4px 0; border-bottom: 1px solid var(--border); color: var(--text); }
        .attendee-list li:last-child { border-bottom: none; }

        /* ── Buttons ────────────────────────────── */
        .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; width: 100%; max-width: 340px; }
        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: .875rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
            text-align: center;
            min-width: 120px;
        }
        .btn-primary { background: var(--navy); color: white; }
        .btn-primary:hover { background: #151b6b; }
        .btn-success { background: var(--green); color: white; }
        .btn-success:hover { background: #1b5e20; }
        .btn-ghost { background: var(--light); color: var(--text); }
        .btn-ghost:hover { background: #e5e7eb; }

        /* ── Manual lookup ──────────────────────── */
        .manual-section { border-top: 1.5px dashed var(--border); padding-top: 18px; margin-top: 18px; }
        .manual-section h4 { font-size: .8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 14px; }
        .input-row { display: flex; gap: 8px; }
        .lookup-input {
            flex: 1;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: 9px;
            font-size: .875rem;
            font-family: inherit;
            outline: none;
            transition: border-color .2s;
        }
        .lookup-input:focus { border-color: var(--navy); }
        .lookup-btn {
            padding: 10px 16px;
            background: var(--navy);
            color: white;
            border: none;
            border-radius: 9px;
            font-size: .875rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: background .2s;
        }
        .lookup-btn:hover { background: #151b6b; }
        .lookup-btn.red { background: var(--red); }
        .lookup-btn.red:hover { background: #b71c1c; }
        .divider-or {
            text-align: center;
            position: relative;
            margin: 14px 0;
            font-size: .75rem;
            color: var(--muted);
        }
        .divider-or::before, .divider-or::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: var(--border);
        }
        .divider-or::before { left: 0; }
        .divider-or::after { right: 0; }

        /* ── Responsive ─────────────────────────── */
        @media (max-width: 700px) {
            .layout { grid-template-columns: 1fr; }
            .topbar-stats { gap: 12px; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-brand">🏏 Dallas Boyz Check-In</div>
    <div class="topbar-stats">
        <div class="topbar-stat">
            <div class="topbar-stat-val" id="checked-in-count">—</div>
            <div class="topbar-stat-label">Checked In</div>
        </div>
        <div class="topbar-stat">
            <div class="topbar-stat-val" id="total-count">—</div>
            <div class="topbar-stat-label">Total</div>
        </div>
    </div>
    <a href="/" class="back-btn">← Home</a>
</div>

<div class="layout">

    <!-- Left: Scanner -->
    <div class="card">
        <div class="card-header">📷 QR Scanner</div>
        <div class="card-body" style="padding:16px">
            <div id="reader"></div>

            <div class="manual-section">
                <h4>Find without QR code</h4>
                <div class="input-row">
                    <input type="email" class="lookup-input" id="manual-email" placeholder="Email address">
                    <button class="lookup-btn red" onclick="checkInByEmail()">Find</button>
                </div>
                <div class="divider-or">or</div>
                <div class="input-row">
                    <input type="text" class="lookup-input" id="manual-code" placeholder="Ticket ID">
                    <button class="lookup-btn" onclick="checkInManual()">Check In</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Right: Result -->
    <div class="card">
        <div class="card-header">✅ Check-In Status</div>
        <div id="result-area" class="result-area state-idle">
            <div class="result-icon">📱</div>
            <div class="result-title">Ready</div>
            <div style="color:var(--muted);font-size:.9rem">Point the camera at a QR code<br>or use email lookup below</div>
        </div>
    </div>

</div>

<script>
    let html5QrCode, isProcessing = false, lastScanned = null;
    let currentGuestId = null, currentBandsGiven = 0, currentTotalTickets = 0, bandsToGive = 1;

    /* ── Scanner ─────────────────────────── */
    function startScanner() {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 240, height: 240 }, aspectRatio: 1 },
            onScanSuccess,
            () => {}
        ).catch(() => {
            document.getElementById('result-area').innerHTML = `
                <div class="result-icon">⚠️</div>
                <div class="result-title">Camera Access Denied</div>
                <div style="color:var(--muted);font-size:.875rem">Allow camera access and refresh the page,<br>or use email lookup instead.</div>
            `;
            document.getElementById('result-area').className = 'result-area state-error';
        });
    }

    function onScanSuccess(text) {
        if (isProcessing || text === lastScanned) return;
        lastScanned = text;
        isProcessing = true;
        html5QrCode.pause();
        processCheckIn(text);
    }

    /* ── Check-in flow ───────────────────── */
    async function processCheckIn(qrCode) {
        setLoading();
        try {
            const r = await fetch('/api/checkin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ qr_code: qrCode })
            });
            const d = await r.json();
            d.success ? displayResult(d) : showError(d.error || 'Check-in failed');
            if (d.success) updateStats();
        } catch { showError('Network error. Please try again.'); }
    }

    function setLoading() {
        document.getElementById('result-area').className = 'result-area state-idle';
        document.getElementById('result-area').innerHTML = `
            <div class="result-icon">⏳</div>
            <div style="color:var(--muted)">Looking up…</div>
        `;
    }

    function displayResult(data) {
        const guest = data.guest;
        currentGuestId = guest.id;
        currentTotalTickets = guest.ticket_count || guest.num_attendees || 1;
        currentBandsGiven = guest.bands_given_count || 0;
        bandsToGive = Math.min(1, currentTotalTickets - currentBandsGiven);

        const area = document.getElementById('result-area');
        area.className = data.already_checked_in ? 'result-area state-warning' : 'result-area state-success';

        let attendeeHTML = '';
        if (guest.attendee_names) {
            const names = guest.attendee_names.split(',').map(n => n.trim()).filter(Boolean);
            if (names.length) {
                attendeeHTML = `
                <div class="attendee-list">
                    <h5>👥 All Attendees</h5>
                    <ul>
                        <li>👤 ${guest.name} <em style="color:var(--muted);font-size:.75rem">(primary)</em></li>
                        ${names.map(n => `<li>👤 ${n}</li>`).join('')}
                    </ul>
                </div>`;
            }
        }

        const remaining = currentTotalTickets - currentBandsGiven;
        const bandBox = remaining > 0 ? `
        <div class="band-box">
            <h4>${data.already_checked_in ? 'Collect More Bands' : 'Bands to Hand Out'}</h4>
            <div class="band-counter">
                <button class="band-btn minus" id="minusBtn" onclick="adjustBands(-1)">−</button>
                <div class="band-num" id="bandCount">${Math.min(1, remaining)}</div>
                <button class="band-btn plus" id="plusBtn" onclick="adjustBands(1)">+</button>
            </div>
            <div class="band-meta">
                Total: <strong>${currentTotalTickets}</strong> &nbsp;·&nbsp;
                Given: <strong>${currentBandsGiven}</strong> &nbsp;·&nbsp;
                Remaining: <strong id="remainingCount">${remaining}</strong>
            </div>
        </div>` : `<div style="color:var(--green);font-weight:600;margin-bottom:16px">✓ All bands collected</div>`;

        area.innerHTML = `
            <div class="result-icon">${data.already_checked_in ? '👋' : '🎉'}</div>
            <div class="result-title">${data.already_checked_in ? 'Already Checked In' : 'Welcome!'}</div>
            <div class="result-name">${guest.name}</div>
            <div class="result-sub">${currentTotalTickets} ticket${currentTotalTickets !== 1 ? 's' : ''}
                &nbsp;·&nbsp; 🥦 ${guest.veg_count || 0} veg &nbsp; 🍗 ${guest.nonveg_count || 0} non-veg
            </div>
            ${attendeeHTML}
            ${bandBox}
            <div class="btn-row">
                ${remaining > 0 ? `<button class="btn btn-success" onclick="saveBands()">✓ Give Bands</button>` : ''}
                <button class="btn btn-ghost" onclick="resumeScanning()">Scan Next →</button>
            </div>
        `;
        updateBtnStates();
    }

    /* ── Band counter ─────────────────────── */
    function adjustBands(delta) {
        const max = currentTotalTickets - currentBandsGiven;
        bandsToGive = Math.max(0, Math.min(bandsToGive + delta, max));
        document.getElementById('bandCount').textContent = bandsToGive;
        updateBtnStates();
    }

    function updateBtnStates() {
        const max = currentTotalTickets - currentBandsGiven;
        const minus = document.getElementById('minusBtn');
        const plus  = document.getElementById('plusBtn');
        if (minus) minus.disabled = bandsToGive <= 0;
        if (plus)  plus.disabled  = bandsToGive >= max;
    }

    async function saveBands() {
        if (bandsToGive <= 0) return;
        try {
            const r = await fetch('/api/give-bands', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ guest_id: currentGuestId, bands_count: bandsToGive })
            });
            const d = await r.json();
            if (d.success) {
                document.getElementById('result-area').innerHTML = `
                    <div class="result-icon">✅</div>
                    <div class="result-title">Bands Given</div>
                    <div class="result-name" style="font-size:1.4rem">${d.message}</div>
                    <div class="result-sub" style="margin-top:8px">${d.bands_given} / ${d.total_bands} bands collected</div>
                    <div class="btn-row" style="margin-top:24px">
                        <button class="btn btn-primary" onclick="resumeScanning()">Scan Next Guest →</button>
                    </div>
                `;
                document.getElementById('result-area').className = 'result-area state-success';
                updateStats();
            } else {
                alert(d.error || 'Failed to save');
            }
        } catch { alert('Network error.'); }
    }

    /* ── Manual lookup ────────────────────── */
    async function checkInByEmail() {
        const email = document.getElementById('manual-email').value.trim().toLowerCase();
        if (!email || !email.includes('@')) { alert('Please enter a valid email address'); return; }
        isProcessing = true;
        if (html5QrCode) html5QrCode.pause();
        setLoading();
        try {
            const r = await fetch('/api/lookup-by-email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const d = await r.json();
            d.success ? (displayResult(d), updateStats()) : showError(d.error || 'Email not found');
        } catch { showError('Network error.'); }
        document.getElementById('manual-email').value = '';
    }

    function checkInManual() {
        const code = document.getElementById('manual-code').value.trim();
        if (code) { processCheckIn(code); document.getElementById('manual-code').value = ''; }
    }

    /* ── Error + reset ────────────────────── */
    function showError(msg) {
        document.getElementById('result-area').className = 'result-area state-error';
        document.getElementById('result-area').innerHTML = `
            <div class="result-icon">❌</div>
            <div class="result-title">Not Found</div>
            <div style="color:var(--muted);font-size:.9rem;margin-bottom:20px">${msg}</div>
            <div class="btn-row"><button class="btn btn-primary" onclick="resumeScanning()">Try Again</button></div>
        `;
    }

    function resumeScanning() {
        isProcessing = false; lastScanned = null;
        currentGuestId = null; currentBandsGiven = 0; currentTotalTickets = 0; bandsToGive = 1;
        document.getElementById('result-area').className = 'result-area state-idle';
        document.getElementById('result-area').innerHTML = `
            <div class="result-icon">📱</div>
            <div class="result-title">Ready</div>
            <div style="color:var(--muted);font-size:.9rem">Point the camera at a QR code<br>or use email lookup below</div>
        `;
        if (html5QrCode) html5QrCode.resume();
    }

    /* ── Stats ────────────────────────────── */
    async function updateStats() {
        try {
            const r = await fetch('/api/stats');
            const s = await r.json();
            document.getElementById('checked-in-count').textContent = s.checked_in;
            document.getElementById('total-count').textContent = s.total_guests;
        } catch {}
    }

    updateStats();
    window.addEventListener('load', startScanner);
</script>
</body>
</html>
